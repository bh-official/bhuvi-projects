<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    link css
     <link rel="stylesheet" href="style.css">
     <script src="script.js" defer></script> 
    <title>Audio and Video</title>
</head>
<body>
    <h1>Image Example</h1>
    <img src="./images/image.png" alt="Sample Image" width="100%">

    <h1>Audio Example</h1>
    <audio src="./audios/audio.mp3" controls></audio>

    <h1>Video Example</h1>
    <video src="./videos/bird.mp4" controls></video>

    <h1>Embedded YouTube Shorts</h1>
    <iframe width="315" height="576" src="https://www.youtube.com/embed/G9NRzrx7m4U" title="switzerland 4k | switzerland 4k video | switzerland" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Embedded YouTube Video</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/nqye02H_H6I?si=b0YG0MDrx70R7MKI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <br/>

    <button>Play</button>
    <button>Pause</button>
    <button>Stop</button> <br/>    
    <input type="range" min="0" max="1" step="0.01" />

</body>
</html>
