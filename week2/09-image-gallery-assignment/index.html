<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An accessible image gallery showcasing stunning nature photography with keyboard navigation and screen reader support.">
    <title>Nature's Canvas | Accessible Image Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <span class="logo-icon" aria-hidden="true">🖼️</span>
                Nature's Canvas
            </h1>
            <p class="tagline">Discover the beauty of our world</p>
        </div>
    </header>

    <main id="main-content" class="main-content">
        <section class="gallery-section" aria-labelledby="gallery-title">
            <h2 id="gallery-title" class="sr-only">Image Gallery</h2>
            
            <!-- Screen reader announcements -->
            <div id="gallery-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
            
            <div class="gallery-container">
                <!-- Main Image Display -->
                <figure class="main-image-container" role="img" aria-labelledby="main-image-caption">
                    <img 
                        id="main-image" 
                        src="images/mountain_sunrise_1768253022020.png" 
                        alt="Snow-capped mountain peaks at sunrise with crystal clear alpine lake reflecting the mountains and golden morning light"
                        class="main-image"
                    >
                    <figcaption id="main-image-caption" class="image-caption">
                        <span id="image-title">Mountain Sunrise</span>
                        <span id="image-counter" class="image-counter">1 of 6</span>
                    </figcaption>
                </figure>

                <!-- Navigation Controls -->
                <div class="gallery-controls" role="group" aria-label="Gallery navigation">
                    <button 
                        id="prev-btn" 
                        class="nav-btn nav-btn-prev" 
                        aria-label="Previous image"
                        type="button"
                    >
                        <span aria-hidden="true">❮</span>
                        <span class="btn-text">Previous</span>
                    </button>
                    
                    <button 
                        id="next-btn" 
                        class="nav-btn nav-btn-next" 
                        aria-label="Next image"
                        type="button"
                    >
                        <span class="btn-text">Next</span>
                        <span aria-hidden="true">❯</span>
                    </button>
                </div>

                <!-- Thumbnail Navigation -->
                <nav class="thumbnail-nav" aria-label="Gallery thumbnails">
                    <ul id="thumbnail-list" class="thumbnail-list" role="list">
                        <!-- Thumbnails will be generated by JavaScript -->
                    </ul>
                </nav>

                <!-- Keyboard instructions -->
                <p class="keyboard-hint" aria-hidden="true">
                    <kbd>←</kbd> <kbd>→</kbd> Use arrow keys to navigate
                </p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Nature's Canvas. Built with accessibility in mind.</p>
        <p class="footer-note">Press <kbd>Tab</kbd> to navigate, <kbd>Enter</kbd> to select</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
