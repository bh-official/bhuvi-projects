<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TomatoTime</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Header & Navigation -->
  <header>
    <div class="header-container">
      <h1>TomatoTime</h1>
      <nav>
        <a href="#home">HOME</a>
        <a href="#about">ABOUT</a>
        <a href="#tomatoes">TOMATOES</a>
        <a href="#timers">TIMERS</a>
        <a href="#bags">TOTE BAGS</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main>
  
    <!-- Section 1 -->
    <section class="hero" id="tomatoes">
      <div class="overlay-text">
        <p class="tag">RECENT FRUITS
        </p>
        <h1>WANT TOMATOES?</h1>
        <button>BUY FROM US</button>
      </div>
    </section>

    <!-- Section 2 -->
    <section class="hero timers" id="timers">
      <div class="overlay-text">
        <p class="tag">BUY A TIMER</p>
        <h1>TIMERS ARE TICKING!</h1>
        <button>TICK TOCK</button>
      </div>
    </section>

    <!-- Section 3 -->
    <section class="hero bags" id="bags">
      <div class="overlay-text">
        <p class="tag">GIVE US MONEY</p>
        <h1>SHOW EVERYONE YOU MEAN IT!</h1>
        <button>READ MORE</button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>TomatoTime © 2025</p>
  </footer>

</body>
</html>
